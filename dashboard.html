<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Bookings</h1>

<div style="overflow-x:auto;">
<table border="1">
<tr>
<th>ID</th>
<th>Name</th>
<th>Phone</th>
<th>Service</th>
<th>Date</th>
<th>Time</th>
</tr>

{% for b in bookings %}
<tr>
<td>{{ b[0] }}</td>
<td>{{ b[1] }}</td>
<td>{{ b[2] }}</td>
<td>{{ b[3] }}</td>
<td>{{ b[4] }}</td>
<td>{{ b[5] }}</td>
</tr>
{% endfor %}

</table>
</div>

</body>
</html>
